<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified School ERP - Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="loginScreen" class="login-overlay">
        <div class="login-box">
            <div class="logo-icon" style="width: 50px; height: 50px; font-size: 1.5rem; margin-bottom: 20px;">U</div>
            <h2>Unified School ERP</h2>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Select your portal to continue</p>
            <select id="loginRole" class="form-control" style="margin-bottom: 16px;">
                <option value="admin">Admin Portal</option>
                <option value="teacher">Teacher Portal</option>
                <option value="parent">Parent Portal</option>
            </select>
            <button class="btn btn-primary" style="width:100%; padding: 12px;" onclick="login()">Secure Login</button>
        </div>
    </div>

    <!-- COMMAND PALETTE -->
    <div id="commandPalette" class="cmd-overlay" style="display:none;">
        <div class="cmd-box">
            <input type="text" id="cmdInput" placeholder="Type a command or search... (e.g., Admit Student, Transport)" oninput="filterCommands()">
            <div id="cmdResults" class="cmd-results"></div>
        </div>
    </div>

    <div id="mainApp" style="display: none; width: 100%; display: flex;">
        <aside class="sidebar no-print">
            <div class="sidebar-header">
                <div class="logo-icon">U</div>
                <div><h1>Unified ERP</h1><span id="portalRoleText">Admin Portal</span></div>
            </div>
            <nav class="nav-menu" id="navMenu"></nav>
            <div style="padding: 20px; border-top: 1px solid var(--border);">
                <button class="btn btn-danger" style="width: 100%;" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar no-print">
                <div><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Real-time overview</p></div>
                
                <div class="user-area" style="flex-wrap: wrap; gap: 12px;">
                    <div class="global-search-container">
                        <input type="text" id="globalSearch" placeholder="🔍 Search..." oninput="handleGlobalSearch()">
                        <div id="searchResults" class="search-results-dropdown"></div>
                    </div>

                    <select id="quickActionSelect" onchange="handleQuickAction(this.value)" class="role-selector" style="background: var(--primary); color: white;">
                        <option value="">⚡ Quick Add</option>
                        <option value="addStudent">Admit Student</option>
                        <option value="addExpense">Log Expense</option>
                        <option value="addTransport">Add Transport Route</option>
                        <option value="addHostel">Add Hostel Room</option>
                    </select>

                    <select id="langSelect" onchange="changeLanguage(this.value)" class="role-selector">
                        <option value="en">🇬🇧 English</option>
                        <option value="ur">🇵🇰 Urdu</option>
                    </select>

                    <button class="btn btn-ghost" onclick="toggleDarkMode()" id="darkModeBtn" style="padding: 8px 12px;">🌙</button>
                    <div class="avatar" style="width: 40px; height: 40px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold;" id="userAvatar">A</div>
                </div>
            </div>

            <div id="appContent"></div>
            <div id="printArea"></div>
        </main>
    </div>

    <div class="modal-overlay no-print" id="erpModal">
        <div class="modal">
            <div class="modal-header"><h3 id="modalTitle">Action</h3><button class="close-btn" onclick="closeModal()">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="toast no-print" id="toastNotification"></div>

    <script src="app.js"></script>
</body>
</html>
